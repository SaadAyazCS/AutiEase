name: autiease
description: "A new Flutter project."
publish_to: 'none'

version: 2.3.0+23

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_tts: ^4.0.2
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Firebase packages
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  cloud_functions: ^5.1.5
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  url_launcher: ^6.3.1
  http: ^0.13.5
  speech_to_text: ^7.0.0
  vosk_flutter: ^0.3.48
  path_provider: ^2.1.2
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  pdf: ^3.11.3
  printing: ^5.14.2
  shared_preferences: ^2.5.5
  audioplayers: ^6.1.0
  record: ^5.1.2
  timezone: ^0.9.4
  shimmer: ^3.0.0

dependency_overrides:
  http: ^0.13.5
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/vosk-model.zip

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/autiease_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/autiease_icon.png"
  adaptive_icon_foreground_inset: 22
  remove_alpha_ios: true
